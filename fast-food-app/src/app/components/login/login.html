<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f0f7f0;font-family:'Segoe UI',sans-serif">
  <div style="background:white;border-radius:16px;border:1px solid #e0e0e0;padding:40px;width:100%;max-width:380px;box-sizing:border-box">

    <div style="text-align:center;margin-bottom:32px">
      <div style="width:56px;height:56px;background:#1D9E75;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M8 12c0-2.2 1.8-4 4-4s4 1.8 4 4"/>
          <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
        </svg>
      </div>
      <h2 i18n="@@login.title" style="margin:0 0 4px;font-size:22px;font-weight:600;color:#111">Verde Sazón</h2>
      <p i18n="@@login.subtitle" style="margin:0;font-size:14px;color:#666">Inicia sesión en tu cuenta</p>
    </div>

    <div style="margin-bottom:16px">
      <label i18n="@@login.email" style="display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:#333">Correo electrónico</label>
      <input [(ngModel)]="email" type="email"
             i18n-placeholder="@@login.email.placeholder" placeholder="tu@email.com"
             style="width:100%;box-sizing:border-box;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none">
    </div>

    <div style="margin-bottom:8px">
      <label i18n="@@login.password" style="display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:#333">Contraseña</label>
      <input [(ngModel)]="password" type="password"
             i18n-placeholder="@@login.password.placeholder" placeholder="••••••••"
             style="width:100%;box-sizing:border-box;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none">
    </div>

    <div style="text-align:right;margin-bottom:24px">
      <a href="#" i18n="@@login.forgot" style="font-size:13px;color:#1D9E75;text-decoration:none">¿Olvidaste tu contraseña?</a>
    </div>

    <div *ngIf="error" style="background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:10px 12px;margin-bottom:16px;font-size:13px;color:#dc2626;text-align:center">
      {{ error }}
    </div>

    <button (click)="login()" [disabled]="cargando"
            style="width:100%;padding:12px;background:#1D9E75;color:white;border:none;border-radius:8px;font-size:15px;font-weight:500;cursor:pointer">
      <ng-container *ngIf="!cargando" i18n="@@login.button">Iniciar sesión</ng-container>
      <ng-container *ngIf="cargando" i18n="@@login.loading">Entrando...</ng-container>
    </button>

    <p style="text-align:center;font-size:13px;color:#888;margin:24px 0 0">
      <span i18n="@@login.noAccount">¿No tienes cuenta?</span>
      <a href="#" i18n="@@login.register" style="color:#1D9E75;text-decoration:none"> Regístrate aquí</a>
    </p>
  </div>
</div>
