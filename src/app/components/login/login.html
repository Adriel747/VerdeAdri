<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f5f5f5;font-family:sans-serif">
  <div style="background:white;padding:40px;border-radius:12px;box-shadow:0 2px 16px rgba(0,0,0,0.1);width:100%;max-width:380px">
    
    <h2 style="text-align:center;margin-bottom:8px">🍔 Fast Food</h2>
    <p style="text-align:center;color:#888;margin-bottom:24px">Panel de Administración</p>

    <input 
      [(ngModel)]="email" 
      type="email" 
      placeholder="Correo electrónico"
      style="display:block;width:100%;padding:10px;margin-bottom:12px;border:1px solid #ddd;border-radius:6px;box-sizing:border-box">

    <input 
      [(ngModel)]="password" 
      type="password" 
      placeholder="Contraseña"
      style="display:block;width:100%;padding:10px;margin-bottom:16px;border:1px solid #ddd;border-radius:6px;box-sizing:border-box">

    <div *ngIf="error" style="color:#e74c3c;margin-bottom:12px;text-align:center;font-size:14px">
      {{ error }}
    </div>

    <button 
      (click)="login()" 
      [disabled]="cargando"
      style="width:100%;padding:12px;background:#e67e22;color:white;border:none;border-radius:6px;cursor:pointer;font-size:16px">
      {{ cargando ? 'Entrando...' : 'Iniciar sesión' }}
    </button>
  </div>
</div>
